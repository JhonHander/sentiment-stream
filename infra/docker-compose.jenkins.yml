# =============================================================================
# docker-compose.jenkins.yml — Local Jenkins Setup
# =============================================================================
# Brings up Jenkins with Docker socket access so pipelines can use Docker.
#
# Usage:
#   docker compose -f infra/docker-compose.jenkins.yml up -d
#
# First-time setup:
#   1. Open http://localhost:8080
#   2. Get initial admin password:
#      docker compose -f infra/docker-compose.jenkins.yml exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword
#   3. Install suggested plugins + Docker Pipeline plugin
#   4. Create a Pipeline job pointing to this repo
# =============================================================================

services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: sentiment-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"     # Web UI
      - "50000:50000"   # Agent communication
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    networks:
      - jenkins-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  jenkins_home:
    driver: local

networks:
  jenkins-network:
    driver: bridge
    name: jenkins-network
